# Trigger Vercel deploy on every push to main via Deploy Hook.
# Requires: GitHub repo secret VERCEL_DEPLOY_HOOK_URL (from Vercel → Project → Settings → Git → Deploy Hooks).
name: Trigger Vercel deploy on push
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -e
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          # Trim whitespace/newlines (e.g. from pasted URL)
          URL=$(echo "$VERCEL_DEPLOY_HOOK_URL" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          echo "Calling Vercel deploy hook..."
          HTTP_CODE=$(curl -sS -o /tmp/vercel-response.txt -w "%{http_code}" -X POST "$URL")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deploy triggered successfully (HTTP $HTTP_CODE). Check Vercel dashboard."
          else
            echo "::error::Deploy hook returned HTTP $HTTP_CODE. Response: $(cat /tmp/vercel-response.txt)"
            exit 1
          fi