# Fail if critical features (e.g. Admin Test order support) are removed by a merge or branch.
name: Check critical features
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-critical-features.mjs
